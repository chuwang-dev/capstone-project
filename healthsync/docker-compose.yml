version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: healthsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - healthnet

  redis:
    image: redis:7-alpine
    networks:
      - healthnet

  backend:
    build: ./backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthsync
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3001'
    networks:
      - healthnet

  auth-service:
    build: ./auth-service
    environment:
      JWT_SECRET: dev-secret
    ports:
      - '3002:3002'
    networks:
      - healthnet

  frontend:
    build: ./frontend
    ports:
      - '8080:80'
    networks:
      - healthnet
    depends_on:
      - backend
      - auth-service

volumes:
  postgres-data:

networks:
  healthnet:
    driver: bridge

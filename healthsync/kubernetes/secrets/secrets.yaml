# Kubernetes Secrets Template
# NOTE: DO NOT commit actual secrets to git. Use sealed-secrets, external-secrets, or vault.
# This is a template - replace values before applying.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: healthsync
type: Opaque
data:
  # Base64 encoded values (echo -n "value" | base64)
  # POSTGRES_PASSWORD: cG9zdGdyZXM=  # postgres
  POSTGRES_PASSWORD: cG9zdGdyZXM=
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: healthsync
type: Opaque
data:
  # JWT_SECRET: ZGV2LXNlY3JldA==  # dev-secret
  JWT_SECRET: ZGV2LXNlY3JldA==
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: healthsync
type: kubernetes.io/dockercfg
data:
  # .dockercfg: <base64-encoded-docker-config>

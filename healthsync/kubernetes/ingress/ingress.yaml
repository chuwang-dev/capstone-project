apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthsync
  namespace: healthsync
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  rules:
  - host: healthsync.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 3001
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3002
  # TLS section (requires cert-manager or manual certificate)
  # tls:
  # - hosts:
  #   - healthsync.example.com
  #   secretName: healthsync-tls

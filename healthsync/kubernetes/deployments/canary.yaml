apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-canary
  namespace: healthsync
  labels:
    app: backend
    version: canary
spec:
  replicas: 1  # Start with 1 replica for canary
  selector:
    matchLabels:
      app: backend
      version: canary
  template:
    metadata:
      labels:
        app: backend
        version: canary
    spec:
      containers:
      - name: backend
        image: healthsync-backend:v1.1.0
        ports:
        - containerPort: 3001
        env:
        - name: VERSION
          value: "v1.1.0-canary"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
---
# Stable version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-stable
  namespace: healthsync
  labels:
    app: backend
    version: stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
      version: stable
  template:
    metadata:
      labels:
        app: backend
        version: stable
    spec:
      containers:
      - name: backend
        image: healthsync-backend:v1.0.0
        ports:
        - containerPort: 3001
        env:
        - name: VERSION
          value: "v1.0.0-stable"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
---
# Service routing (90% stable, 10% canary)
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: healthsync
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
  # Selector matches both stable and canary versions
  selector:
    app: backend
---
# Nginx Ingress with traffic split for canary
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-canary
  namespace: healthsync
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  ingressClassName: nginx
  rules:
  - host: api.healthsync.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-canary
            port:
              number: 3001
---

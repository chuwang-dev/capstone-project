apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-blue
  namespace: healthsync
  labels:
    app: backend
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
      version: blue
  template:
    metadata:
      labels:
        app: backend
        version: blue
    spec:
      containers:
      - name: backend
        image: healthsync-backend:v1.0.0
        ports:
        - containerPort: 3001
        env:
        - name: VERSION
          value: "v1.0.0-blue"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-green
  namespace: healthsync
  labels:
    app: backend
    version: green
spec:
  replicas: 0  # Initially scaled to 0, will be scaled up during deployment
  selector:
    matchLabels:
      app: backend
      version: green
  template:
    metadata:
      labels:
        app: backend
        version: green
    spec:
      containers:
      - name: backend
        image: healthsync-backend:v1.1.0
        ports:
        - containerPort: 3001
        env:
        - name: VERSION
          value: "v1.1.0-green"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
---
# Service routes to blue by default
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: healthsync
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: backend
    version: blue
---
# Switch traffic to green: kubectl patch service backend -n healthsync -p '{"spec":{"selector":{"version":"green"}}}'
# Rollback to blue: kubectl patch service backend -n healthsync -p '{"spec":{"selector":{"version":"blue"}}}'
